<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Roboto', sans-serif; background-color: white; }
        #main-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between;
            width: 100%; height: 450px; padding: 5px; box-sizing: border-box;
        }
        h2 { margin: 0 0 5px 0; color: #317eae; font-weight: 700; font-size: 24px; }
        .game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        canvas { border: 2px solid #6495ED; background: #fff; max-width: 100%; height: auto; cursor: pointer; }
        .controls { text-align: center; width: 100%; margin-top: 5px; }
        #instruction { font-size: 11px; color: #888; margin: 5px 0 0 0; }
        .btn { padding: 8px 25px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; min-width: 110px; font-family: 'Roboto'; font-size: 14px; transition: background 0.3s; }
        .play-mode { background-color: #6495ED; }
        .stop-mode { background-color: #dc3545; }
        .github-link { display: inline-block; margin-top: 4px; color: #317eae; font-size: 13px; text-decoration: underline; }
    </style>
</head>
<body>
<div id="main-container">
    <h2>Tic Tac Toe</h2>
    <div class="game-area"><canvas id="tttCanvas" width="300" height="300"></canvas></div>
    <div class="controls">
        <button id="toggleBtn" class="btn play-mode" onclick="resetGame()">Play</button>
        <p id="instruction">Turn: <span id="turnDisplay">X</span></p>
        <a href="https://github.com/harsven/python-games/tree/main/TicTacToe" target="_blank" class="github-link">View Python Code on GitHub</a>
    </div>
</div>
<script>
    const canvas = document.getElementById("tttCanvas"); const ctx = canvas.getContext("2d");
    const btn = document.getElementById("toggleBtn");
    const turnDisp = document.getElementById("turnDisplay");
    
    let board = [[" "," "," "],[" "," "," "],[" "," "," "]], turn = "X", winner = null;
    let gameStarted = false;

    function resetGame() {
        board = [[" "," "," "],[" "," "," "],[" "," "," "]];
        turn = "X";
        winner = null;
        gameStarted = false;
        btn.innerText = "Play";
        btn.className = "btn play-mode";
        turnDisp.innerText = turn;
        draw();
    }

    canvas.addEventListener('click', (e) => {
        if (winner) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (300 / rect.width);
        const y = (e.clientY - rect.top) * (300 / rect.height);
        const j = Math.floor(x / 100), i = Math.floor(y / 100);

        if (board[i][j] === " ") {
            // Beim ersten Klick den Button ändern
            if (!gameStarted) {
                gameStarted = true;
                btn.innerText = "Restart";
                btn.className = "btn stop-mode";
            }

            board[i][j] = turn;
            if (checkWin(turn)) { 
                winner = turn; 
                turnDisp.innerText = turn + " Wins!"; 
            }
            else if (board.flat().every(c => c !== " ")) { 
                winner = "Tie"; 
                turnDisp.innerText = "Tie!"; 
            }
            else { 
                turn = turn === "X" ? "O" : "X"; 
                turnDisp.innerText = turn; 
            }
            draw();
        }
    });

    function checkWin(s) {
        for(let i=0; i<3; i++) if(board[i].every(c=>c===s) || [0,1,2].every(j=>board[j][i]===s)) return true;
        return (board[0][0]===s && board[1][1]===s && board[2][2]===s) || (board[0][2]===s && board[1][1]===s && board[2][0]===s);
    }

    function draw() {
        ctx.clearRect(0, 0, 300, 300); ctx.strokeStyle = "#317eae"; ctx.lineWidth = 2;
        for(let i=1; i<3; i++) { 
            ctx.beginPath(); ctx.moveTo(i*100, 10); ctx.lineTo(i*100, 290); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(10, i*100); ctx.lineTo(290, i*100); ctx.stroke();
        }
        ctx.font = "60px Roboto"; ctx.textAlign = "center"; ctx.fillStyle = "#6495ED";
        for(let i=0; i<3; i++) for(let j=0; j<3; j++) if(board[i][j]!==" ") ctx.fillText(board[i][j], j*100+50, i*100+70);
    }
    draw();
</script>
</body>
</html>
