<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Roboto', sans-serif; background-color: white; }
        
        #main-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between;
            width: 100%; height: 450px; padding: 5px; box-sizing: border-box;
        }

        /* Überschrift in deinem Portfolio-Blau */
        h2 { margin: 0 0 5px 0; color: #317eae; font-weight: 700; font-size: 24px; }
        
        .game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        
        /* Canvas Rahmen angepasst */
        canvas { border: 2px solid #317eae; background: #fff; max-width: 100%; height: auto; }
        
        .controls { text-align: center; width: 100%; margin-top: 5px; }
        #instruction { font-size: 11px; color: #888; margin: 5px 0 0 0; }
        
        /* Button Design konsistent zu den anderen Spielen */
        .btn { padding: 8px 25px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; min-width: 110px; font-family: 'Roboto'; font-size: 14px; }
        .play-mode { background-color: #317eae; }
        .stop-mode { background-color: #dc3545; }
        
        .github-link { display: inline-block; margin-top: 4px; color: #317eae; font-size: 13px; text-decoration: underline; }
    </style>
</head>
<body>

<div id="main-container">
    <h2>Pong</h2>
    <div class="game-area">
        <canvas id="pongCanvas" width="500" height="300"></canvas>
    </div>
    <div class="controls">
        <button id="toggleBtn" class="btn play-mode" onclick="toggleGame()">Play</button>
        <p id="instruction">Player 1: W/S | Player 2: Arrow Up/Down</p>
        <a href="https://github.com/harsven/python-games/tree/main/Pong" target="_blank" class="github-link">View Python Code on GitHub</a>
    </div>
</div>

<script>
    // --- Konfiguration & DOM ---
    const canvas = document.getElementById("pongCanvas"); 
    const ctx = canvas.getContext("2d"); 
    const btn = document.getElementById("toggleBtn");
    
    const THEME_COLOR = "#317eae";
    const PADDLE_HEIGHT = 80;
    const PADDLE_WIDTH = 10;
    const BALL_RADIUS = 8;

    // --- Spiel Variablen ---
    let isRunning = false; 
    let ball_pos = [250, 150]; 
    let ball_vel = [0, 0]; 
    let p1_y = 110, p2_y = 110; // Vertikale Position der Paddles
    let p1_v = 0, p2_v = 0;     // Geschwindigkeit der Paddles
    let score1 = 0, score2 = 0;

    /**
     * Startet oder stoppt das Spiel.
     */
    function toggleGame() { 
        if (!isRunning) { 
            isRunning = true; 
            btn.innerText = "Stop"; 
            btn.className = "btn stop-mode"; 
            spawnBall(true); 
        } else { 
            isRunning = false; 
            btn.innerText = "Play"; 
            btn.className = "btn play-mode"; 
            resetToCenter(); 
        } 
    }

    /**
     * Setzt Paddles und Ball zurück in die Mitte.
     */
    function resetToCenter() { 
        ball_pos = [250, 150]; 
        ball_vel = [0, 0]; 
        p1_y = 110; 
        p2_y = 110; 
    }

    /**
     * Schießt den Ball neu ein.
     * @param {boolean} toRight - Richtung des Ballstarts
     */
    function spawnBall(toRight) { 
        ball_pos = [250, 150]; 
        // Horizontale Geschwindigkeit (3/-3), vertikal zufällig
        ball_vel = [(toRight ? 3 : -3), (Math.random() * 3 - 1.5)]; 
    }

    /**
     * Berechnet die Bewegungen und prüft Kollisionen.
     */
    function update() { 
        if (!isRunning) return; 

        // Ball Bewegung
        ball_pos[0] += ball_vel[0]; 
        ball_pos[1] += ball_vel[1]; 

        // Paddle Bewegung (begrenzt auf Spielfeldhöhe)
        p1_y = Math.max(0, Math.min(canvas.height - PADDLE_HEIGHT, p1_y + p1_v)); 
        p2_y = Math.max(0, Math.min(canvas.height - PADDLE_HEIGHT, p2_y + p2_v)); 

        // Wand-Kollision (Oben/Unten)
        if (ball_pos[1] <= BALL_RADIUS || ball_pos[1] >= canvas.height - BALL_RADIUS) {
            ball_vel[1] *= -1; 
        }

        // --- Kollision Links (Player 1) ---
        if (ball_pos[0] <= PADDLE_WIDTH + BALL_RADIUS) { 
            if (ball_pos[1] > p1_y && ball_pos[1] < p1_y + PADDLE_HEIGHT) {
                ball_vel[0] *= -1.1; // Geschwindigkeit bei Treffer leicht erhöhen
            } else { 
                score2++; 
                spawnBall(true); 
            } 
        } 

        // --- Kollision Rechts (Player 2) ---
        if (ball_pos[0] >= canvas.width - PADDLE_WIDTH - BALL_RADIUS) { 
            if (ball_pos[1] > p2_y && ball_pos[1] < p2_y + PADDLE_HEIGHT) {
                ball_vel[0] *= -1.1; 
            } else { 
                score1++; 
                spawnBall(false); 
            } 
        } 
    }

    /**
     * Zeichnet alle Elemente auf den Canvas.
     */
    function draw() { 
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        ctx.fillStyle = THEME_COLOR; 
        ctx.strokeStyle = THEME_COLOR; 
        ctx.font = "bold 24px Roboto"; 
        ctx.textAlign = "center"; 

        // --- Scores zeichnen (leicht transparent für Hintergrund-Look) ---
        ctx.globalAlpha = 0.3; 
        ctx.fillText(score1, 125, 60); 
        ctx.fillText(score2, 375, 60); 
        ctx.globalAlpha = 1.0; 

        // --- Mittellinie ---
        ctx.setLineDash([5, 10]); 
        ctx.lineWidth = 1;
        ctx.beginPath(); 
        ctx.moveTo(250, 0); 
        ctx.lineTo(250, 300); 
        ctx.stroke(); 
        ctx.setLineDash([]); 

        // --- Ball ---
        ctx.beginPath(); 
        ctx.arc(ball_pos[0], ball_pos[1], BALL_RADIUS, 0, Math.PI * 2); 
        ctx.fill(); 

        // --- Paddles ---
        ctx.fillRect(0, p1_y, PADDLE_WIDTH, PADDLE_HEIGHT); 
        ctx.fillRect(canvas.width - PADDLE_WIDTH, p2_y, PADDLE_WIDTH, PADDLE_HEIGHT); 

        // Logik-Update und nächste Frame-Anfrage
        update(); 
        requestAnimationFrame(draw); 
    }

    // --- Input Handling ---
    window.addEventListener("keydown", e => { 
        // Player 1 (W/S)
        if(e.key.toLowerCase() === 'w') p1_v = -5; 
        if(e.key.toLowerCase() === 's') p1_v = 5; 
        // Player 2 (Arrows)
        if(e.key === 'ArrowUp') p2_v = -5; 
        if(e.key === 'ArrowDown') p2_v = 5; 
        
        // Website-Scrollen verhindern
        if(["ArrowUp","ArrowDown"].includes(e.key)) e.preventDefault(); 
    });

    window.addEventListener("keyup", e => { 
        if(['w','s'].includes(e.key.toLowerCase())) p1_v = 0; 
        if(['ArrowUp','ArrowDown'].includes(e.key)) p2_v = 0; 
    });

    // Start der Animation
    draw();
</script>

</body>
</html>
