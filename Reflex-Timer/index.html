<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Roboto', sans-serif; background-color: white; }
        #main-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between;
            width: 100%; height: 450px; padding: 5px; box-sizing: border-box;
        }
        h2 { margin: 0 0 5px 0; color: #317eae; font-weight: 700; font-size: 24px; }
        .game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        canvas { border: 2px solid #6495ED; background: #fff; max-width: 100%; height: auto; }
        .controls { text-align: center; width: 100%; margin-top: 5px; }
        #instruction { font-size: 11px; color: #888; margin: 5px 0 0 0; }
        .btn { padding: 8px 25px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; min-width: 110px; font-family: 'Roboto'; font-size: 14px; }
        .play-mode { background-color: #6495ED; }
        .stop-mode { background-color: #dc3545; }
        .github-link { display: inline-block; margin-top: 4px; color: #317eae; font-size: 13px; text-decoration: underline; }
    </style>
</head>
<body>
<div id="main-container">
    <h2>Reflex Timer</h2>
    <div class="game-area"><canvas id="timerCanvas" width="300" height="200"></canvas></div>
    <div class="controls">
        <button id="toggleBtn" class="btn play-mode" onclick="toggleGame()">Play</button>
        <p id="instruction">Stop on .0 for points! | Total: 5</p>
        <a href="https://github.com/harsven/python-games/tree/main/Timer" target="_blank" class="github-link">View Python Code on GitHub</a>
    </div>
</div>
<script>
    const canvas = document.getElementById("timerCanvas"); const ctx = canvas.getContext("2d"); const btn = document.getElementById("toggleBtn");
    let isRunning = false; let a=0, b=0, c=0, chances=0, total=0, timer;
    function toggleGame() {
        if (!isRunning) { isRunning = true; btn.innerText = "Stop"; btn.className = "btn stop-mode"; timer = setInterval(tick, 100); }
        else { isRunning = false; btn.innerText = "Start"; btn.className = "btn play-mode"; clearInterval(timer); total++; if (c===0) chances++; if (total >= 5) setTimeout(resetFull, 2000); }
    }
    function resetFull() { a=0; b=0; c=0; chances=0; total=0; draw(); }
    function tick() { c++; if (c===10) { b++; c=0; if (b===60) { a++; b=0; } } draw(); }
    function draw() {
        ctx.clearRect(0, 0, 300, 200); ctx.fillStyle = "#6495ED"; ctx.textAlign = "center";
        ctx.font = "20px Roboto"; ctx.fillText(chances + " / " + total, 250, 30);
        ctx.font = "40px Roboto"; ctx.fillText(`${a.toString().padStart(2,'0')}:${b.toString().padStart(2,'0')}.${c}`, 150, 110);
        ctx.font = "16px Roboto";
        if (total === 5) {
            let msg = chances < 3 ? "Keep practicing!" : (chances < 5 ? "Good reflexes!" : "Incredible!");
            ctx.fillText(msg, 150, 160);
        }
    }
    draw();
</script>
</body>
</html>
